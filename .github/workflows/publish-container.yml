# Julkaise CPU- ja ROCm-imaget GHCR:ään kun luodaan git-tag muodossa v* (esim. v0.1.0).
# Paketti: ghcr.io/<repository owner pienillä>/<repo pienillä> — GitHub vaatii imagen nimen lowercase.

name: Publish container images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=cpu,enable=true
            type=raw,value=latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REVISION=${{ github.sha }}
            IMAGE_VERSION=${{ github.ref_name }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_TITLE_SUFFIX=CPU

  publish-rocm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GHCR image name (lowercase)
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=-rocm
            type=raw,value=rocm,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rocm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_REVISION=${{ github.sha }}
            IMAGE_VERSION=${{ github.ref_name }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_TITLE_SUFFIX=ROCm
